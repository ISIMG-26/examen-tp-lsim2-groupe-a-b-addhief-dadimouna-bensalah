<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔧 Diagnostic Roulez.tn</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      border-radius: 8px;
      padding: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #c1272d;
      border-bottom: 2px solid #c1272d;
      padding-bottom: 10px;
    }
    .test {
      margin: 20px 0;
      padding: 15px;
      border-left: 4px solid #ddd;
      background: #fafafa;
    }
    .test.ok {
      border-left-color: #4caf50;
      background: #f1f8f4;
    }
    .test.err {
      border-left-color: #f44336;
      background: #fdf7f6;
    }
    .test.warn {
      border-left-color: #ff9800;
      background: #fef9f6;
    }
    .test-title {
      font-weight: bold;
      margin-bottom: 8px;
    }
    .test-result {
      font-size: 0.9rem;
      color: #666;
      font-family: 'Courier New', monospace;
      word-break: break-all;
    }
    button {
      background: #c1272d;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
    }
    button:hover {
      background: #a01f24;
    }
    .loading {
      display: inline-block;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🔧 Diagnostic - Roulez.tn</h1>
  
  <div id="results"></div>
  
  <button onclick="runTests()">🔄 Exécuter tous les tests</button>
</div>

<script>
async function runTests() {
  const results = document.getElementById('results');
  results.innerHTML = '<div class="test"><div class="test-title">⏳ Tests en cours...</div></div>';
  
  const tests = [];
  
  // Test 1: API accessible
  try {
    const r = await fetch('test-api.php');
    const data = await r.json();
    tests.push({
      title: '✅ API accessible',
      status: 'ok',
      result: `PHP ${data.php_version} - ${data.server}`
    });
  } catch (e) {
    tests.push({
      title: '❌ API inaccessible',
      status: 'err',
      result: e.message
    });
  }
  
  // Test 2: Machines API
  try {
    const r = await fetch('machines.php?action=list');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    const count = data.machines?.length || 0;
    tests.push({
      title: '✅ Machines API',
      status: 'ok',
      result: `${count} véhicule(s) trouvé(s)`
    });
  } catch (e) {
    tests.push({
      title: '❌ Machines API',
      status: 'err',
      result: e.message
    });
  }
  
  // Test 3: Auth API
  try {
    const r = await fetch('auth.php?action=status');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    const logged = data.logged_in ? 'oui' : 'non';
    tests.push({
      title: '✅ Auth API',
      status: 'ok',
      result: `Connecté: ${logged}`
    });
  } catch (e) {
    tests.push({
      title: '❌ Auth API',
      status: 'err',
      result: e.message
    });
  }
  
  // Test 4: Dossier uploads
  try {
    const r = await fetch('uploads/');
    tests.push({
      title: r.ok ? '✅ Dossier uploads/' : '⚠️ Dossier uploads/ existe',
      status: r.ok ? 'ok' : 'warn',
      result: r.ok ? 'Accessible' : 'Existe mais pas d\'accès direct (normal)'
    });
  } catch (e) {
    tests.push({
      title: '⚠️ Dossier uploads/',
      status: 'warn',
      result: 'Non accessible via HTTP'
    });
  }
  
  // Afficher les résultats
  results.innerHTML = tests.map(t => `
    <div class="test ${t.status}">
      <div class="test-title">${t.title}</div>
      <div class="test-result">${t.result}</div>
    </div>
  `).join('');
  
  // Résumé
  const errors = tests.filter(t => t.status === 'err').length;
  const summary = errors === 0 
    ? '✅ Tous les tests sont passés! Votre configuration est bonne.'
    : `❌ ${errors} test(s) échoué(s). Consultez les détails ci-dessus.`;
  
  results.innerHTML += `
    <div class="test" style="margin-top: 20px; background: ${errors === 0 ? '#f1f8f4' : '#fdf7f6'}">
      <div class="test-title">${summary}</div>
    </div>
  `;
}

// Exécuter les tests au chargement
document.addEventListener('DOMContentLoaded', runTests);
</script>

</body>
</html>
